<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>

  <form action="/login" method="POST">

    <label for="usuario">Usuário:</label>
    <input type="text" id="usuario" name="usuario">
    <br>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha">
    <br>

    <button type="submit">Entrar</button>

  </form>

</body>
</html>
