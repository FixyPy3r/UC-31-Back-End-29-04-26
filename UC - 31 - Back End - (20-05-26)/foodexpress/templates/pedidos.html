<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FoodExpress — Pedidos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="/">FoodExpress</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="/cardapio">Cardápio</a></li>
          <li class="nav-item"><a class="nav-link active" href="/pedidos">Pedidos</a></li>
          <li class="nav-item"><a class="nav-link" href="/contato">Contato</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- TÍTULO -->
  <div class="bg-dark text-white text-center py-4">
    <h2 class="fw-bold mb-1">Pedidos Recentes</h2>
    <p class="mb-0 text-muted">Acompanhe o status de cada pedido</p>
  </div>

  <!-- TABELA DE PEDIDOS -->
  <div class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0">Lista de Pedidos</h5>
      <a href="/cardapio" class="btn btn-danger">+ Novo Pedido</a>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-bordered table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>-</th>
            <th>Cliente</th>
            <th>Pedido</th>
            <th>Valor</th>
            <th>Visualizar</th>
          </tr>
        </thead>
        <tbody>
          {% for p in pedidos %}
          <tr>
            <td>{{ p.id }}</td>
            <td class="fw-bold">{{ p.cliente }}</td>
            <td>{{ p.pedido }}</td>
            <td class="text-warning fw-bold">{{ p.valor }}</td>
           
            <td>
              <a href="/cliente/{{ p.cliente.split()[0] }}/Natal" class="btn btn-sm btn-outline-secondary">Ver</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
